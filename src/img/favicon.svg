<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- 3D cube faces - parent (large) -->
    <linearGradient id="top-lg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e88a8a"/>
      <stop offset="100%" stop-color="#d46b6b"/>
    </linearGradient>
    <linearGradient id="left-lg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b84c4c"/>
      <stop offset="100%" stop-color="#a33e3e"/>
    </linearGradient>
    <linearGradient id="right-lg" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#cf5f5f"/>
      <stop offset="100%" stop-color="#c25252"/>
    </linearGradient>

    <!-- 3D cube faces - child (medium) -->
    <linearGradient id="top-md" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4a6a6"/>
      <stop offset="100%" stop-color="#e88a8a"/>
    </linearGradient>
    <linearGradient id="left-md" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c76060"/>
      <stop offset="100%" stop-color="#b84c4c"/>
    </linearGradient>
    <linearGradient id="right-md" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#db7777"/>
      <stop offset="100%" stop-color="#cf5f5f"/>
    </linearGradient>

    <!-- 3D cube faces - grandchild (small) -->
    <linearGradient id="top-sm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcc0c0"/>
      <stop offset="100%" stop-color="#f4a6a6"/>
    </linearGradient>
    <linearGradient id="left-sm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d47070"/>
      <stop offset="100%" stop-color="#c76060"/>
    </linearGradient>
    <linearGradient id="right-sm" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#e88e8e"/>
      <stop offset="100%" stop-color="#db7777"/>
    </linearGradient>
  </defs>

  <!-- Curved lines from parent to children -->
  <path d="M 32 18 C 32 28, 16 24, 16 34" stroke="rgba(252,103,103,0.7)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 32 18 C 32 28, 48 24, 48 34" stroke="rgba(252,103,103,0.7)" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Curved lines from left child to grandchildren -->
  <path d="M 16 40 C 16 48, 8 46, 8 52" stroke="rgba(252,103,103,0.5)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M 16 40 C 16 48, 24 46, 24 52" stroke="rgba(252,103,103,0.5)" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Curved lines from right child to grandchildren -->
  <path d="M 48 40 C 48 48, 40 46, 40 52" stroke="rgba(252,103,103,0.5)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M 48 40 C 48 48, 56 46, 56 52" stroke="rgba(252,103,103,0.5)" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Parent cube (large, 14px) - center top -->
  <g transform="translate(32, 12)">
    <!-- Top face -->
    <polygon points="0,-5 7,-1.5 0,2 -7,-1.5" fill="url(#top-lg)"/>
    <!-- Left face -->
    <polygon points="-7,-1.5 0,2 0,9 -7,5.5" fill="url(#left-lg)"/>
    <!-- Right face -->
    <polygon points="7,-1.5 0,2 0,9 7,5.5" fill="url(#right-lg)"/>
  </g>

  <!-- Left child cube (medium, 10px) -->
  <g transform="translate(16, 34)">
    <!-- Top face -->
    <polygon points="0,-3.5 5,-1 0,1.5 -5,-1" fill="url(#top-md)"/>
    <!-- Left face -->
    <polygon points="-5,-1 0,1.5 0,7 -5,4.5" fill="url(#left-md)"/>
    <!-- Right face -->
    <polygon points="5,-1 0,1.5 0,7 5,4.5" fill="url(#right-md)"/>
  </g>

  <!-- Right child cube (medium, 10px) -->
  <g transform="translate(48, 34)">
    <polygon points="0,-3.5 5,-1 0,1.5 -5,-1" fill="url(#top-md)"/>
    <polygon points="-5,-1 0,1.5 0,7 -5,4.5" fill="url(#left-md)"/>
    <polygon points="5,-1 0,1.5 0,7 5,4.5" fill="url(#right-md)"/>
  </g>

  <!-- Grandchild cubes (small, 7px) -->
  <!-- Left-left grandchild -->
  <g transform="translate(8, 52)">
    <polygon points="0,-2.5 3.5,-0.7 0,1 -3.5,-0.7" fill="url(#top-sm)"/>
    <polygon points="-3.5,-0.7 0,1 0,5 -3.5,3.3" fill="url(#left-sm)"/>
    <polygon points="3.5,-0.7 0,1 0,5 3.5,3.3" fill="url(#right-sm)"/>
  </g>

  <!-- Left-right grandchild -->
  <g transform="translate(24, 52)">
    <polygon points="0,-2.5 3.5,-0.7 0,1 -3.5,-0.7" fill="url(#top-sm)"/>
    <polygon points="-3.5,-0.7 0,1 0,5 -3.5,3.3" fill="url(#left-sm)"/>
    <polygon points="3.5,-0.7 0,1 0,5 3.5,3.3" fill="url(#right-sm)"/>
  </g>

  <!-- Right-left grandchild -->
  <g transform="translate(40, 52)">
    <polygon points="0,-2.5 3.5,-0.7 0,1 -3.5,-0.7" fill="url(#top-sm)"/>
    <polygon points="-3.5,-0.7 0,1 0,5 -3.5,3.3" fill="url(#left-sm)"/>
    <polygon points="3.5,-0.7 0,1 0,5 3.5,3.3" fill="url(#right-sm)"/>
  </g>

  <!-- Right-right grandchild -->
  <g transform="translate(56, 52)">
    <polygon points="0,-2.5 3.5,-0.7 0,1 -3.5,-0.7" fill="url(#top-sm)"/>
    <polygon points="-3.5,-0.7 0,1 0,5 -3.5,3.3" fill="url(#left-sm)"/>
    <polygon points="3.5,-0.7 0,1 0,5 3.5,3.3" fill="url(#right-sm)"/>
  </g>
</svg>
