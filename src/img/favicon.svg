<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Parent sphere - front-facing -->
    <radialGradient id="sphere-parent" cx="0.38" cy="0.32" r="0.6">
      <stop offset="0%" stop-color="#f6edd0"/>
      <stop offset="50%" stop-color="#c8b890"/>
      <stop offset="100%" stop-color="#6b5f3e"/>
    </radialGradient>

    <!-- Left child - turned slightly left -->
    <radialGradient id="sphere-child-l" cx="0.3" cy="0.28" r="0.6">
      <stop offset="0%" stop-color="#f6edd0"/>
      <stop offset="50%" stop-color="#d4c8a0"/>
      <stop offset="100%" stop-color="#7a6d48"/>
    </radialGradient>

    <!-- Right child - turned slightly right, further back -->
    <radialGradient id="sphere-child-r" cx="0.45" cy="0.35" r="0.55">
      <stop offset="0%" stop-color="#e8dfc2"/>
      <stop offset="50%" stop-color="#b8ad85"/>
      <stop offset="100%" stop-color="#5e5335"/>
    </radialGradient>

    <!-- Grandchild 1 (far left) - angled left -->
    <radialGradient id="sphere-gc1" cx="0.28" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#f6edd0"/>
      <stop offset="50%" stop-color="#d4c8a0"/>
      <stop offset="100%" stop-color="#7a6d48"/>
    </radialGradient>

    <!-- Grandchild 2 (center-left) - facing forward, further back -->
    <radialGradient id="sphere-gc2" cx="0.4" cy="0.38" r="0.55">
      <stop offset="0%" stop-color="#e4dbb8"/>
      <stop offset="50%" stop-color="#b0a578"/>
      <stop offset="100%" stop-color="#564c30"/>
    </radialGradient>

    <!-- Grandchild 3 (inner-left) - angled right -->
    <radialGradient id="sphere-gc3" cx="0.45" cy="0.28" r="0.6">
      <stop offset="0%" stop-color="#f6edd0"/>
      <stop offset="50%" stop-color="#cec198"/>
      <stop offset="100%" stop-color="#706440"/>
    </radialGradient>

    <!-- Grandchild 4 (inner-right) - further back, dimmer -->
    <radialGradient id="sphere-gc4" cx="0.35" cy="0.4" r="0.52">
      <stop offset="0%" stop-color="#ddd4b0"/>
      <stop offset="50%" stop-color="#a89c70"/>
      <stop offset="100%" stop-color="#4e4428"/>
    </radialGradient>

    <!-- Grandchild 5 (far right) - angled right -->
    <radialGradient id="sphere-gc5" cx="0.48" cy="0.32" r="0.58">
      <stop offset="0%" stop-color="#f0e6c8"/>
      <stop offset="50%" stop-color="#c0b488"/>
      <stop offset="100%" stop-color="#645838"/>
    </radialGradient>
  </defs>

  <!-- Lines from parent to children -->
  <line x1="32" y1="9" x2="16" y2="33" stroke="rgba(252,103,103,0.7)" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="9" x2="48" y2="31" stroke="rgba(252,103,103,0.7)" stroke-width="2" stroke-linecap="round"/>

  <!-- Lines from left child to 3 grandchildren -->
  <line x1="16" y1="33" x2="6" y2="52" stroke="rgba(252,103,103,0.6)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="33" x2="17" y2="49" stroke="rgba(252,103,103,0.6)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="33" x2="28" y2="59" stroke="rgba(252,103,103,0.6)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Lines from right child to 2 grandchildren -->
  <line x1="48" y1="31" x2="41" y2="47" stroke="rgba(252,103,103,0.6)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48" y1="31" x2="56" y2="49" stroke="rgba(252,103,103,0.6)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Parent sphere - closest -->
  <circle cx="32" cy="9" r="6.5" fill="url(#sphere-parent)"/>

  <!-- Left child - close -->
  <circle cx="16" cy="33" r="6" fill="url(#sphere-child-l)"/>

  <!-- Right child - mid-far -->
  <circle cx="48" cy="31" r="3.5" fill="url(#sphere-child-r)"/>

  <!-- Left grandchild spheres (3) -->
  <circle cx="6" cy="52" r="6" fill="url(#sphere-gc1)"/>
  <circle cx="17" cy="49" r="4.5" fill="url(#sphere-gc2)"/>
  <circle cx="28" cy="59" r="6" fill="url(#sphere-gc3)"/>

  <!-- Right grandchild spheres (2) -->
  <circle cx="41" cy="47" r="3" fill="url(#sphere-gc4)"/>
  <circle cx="56" cy="49" r="3.5" fill="url(#sphere-gc5)"/>
</svg>
