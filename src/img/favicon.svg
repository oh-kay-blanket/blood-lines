<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- 3D cube faces - parent (large) -->
    <linearGradient id="top-lg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e88a8a"/>
      <stop offset="100%" stop-color="#d46b6b"/>
    </linearGradient>
    <linearGradient id="left-lg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b84c4c"/>
      <stop offset="100%" stop-color="#a33e3e"/>
    </linearGradient>
    <linearGradient id="right-lg" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#cf5f5f"/>
      <stop offset="100%" stop-color="#c25252"/>
    </linearGradient>

    <!-- 3D cube faces - child (medium) -->
    <linearGradient id="top-md" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4a6a6"/>
      <stop offset="100%" stop-color="#e88a8a"/>
    </linearGradient>
    <linearGradient id="left-md" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c76060"/>
      <stop offset="100%" stop-color="#b84c4c"/>
    </linearGradient>
    <linearGradient id="right-md" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#db7777"/>
      <stop offset="100%" stop-color="#cf5f5f"/>
    </linearGradient>

    <!-- 3D cube faces - grandchild (small) -->
    <linearGradient id="top-sm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcc0c0"/>
      <stop offset="100%" stop-color="#f4a6a6"/>
    </linearGradient>
    <linearGradient id="left-sm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d47070"/>
      <stop offset="100%" stop-color="#c76060"/>
    </linearGradient>
    <linearGradient id="right-sm" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#e88e8e"/>
      <stop offset="100%" stop-color="#db7777"/>
    </linearGradient>
  </defs>

  <!-- Curved lines from parent to children -->
  <path d="M 32 20.5 C 32 24, 16 24, 16 27.5" stroke="rgba(252,103,103,0.7)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 32 20.5 C 32 28, 48 28, 48 34.5" stroke="rgba(252,103,103,0.7)" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Curved lines from left child to 3 grandchildren -->
  <path d="M 16 41.5 C 16 44, 5 43, 5 45.5" stroke="rgba(252,103,103,0.6)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 16 41.5 C 16 45, 17 45, 17 48.5" stroke="rgba(252,103,103,0.6)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 16 41.5 C 16 44, 28 44, 28 46.5" stroke="rgba(252,103,103,0.6)" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Curved lines from right child to 2 grandchildren -->
  <path d="M 48 48.5 C 48 51, 41 51, 41 53.5" stroke="rgba(252,103,103,0.6)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 48 48.5 C 48 52, 56 51, 56 54.5" stroke="rgba(252,103,103,0.6)" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Parent cube (large, s=9) - center top -->
  <g transform="translate(32, 7)">
    <polygon points="0,-4.5 7.8,0 0,4.5 -7.8,0" fill="url(#top-lg)"/>
    <polygon points="-7.8,0 0,4.5 0,13.5 -7.8,9" fill="url(#left-lg)"/>
    <polygon points="7.8,0 0,4.5 0,13.5 7.8,9" fill="url(#right-lg)"/>
  </g>

  <!-- Left child cube (medium, s=7) - higher -->
  <g transform="translate(16, 31)">
    <polygon points="0,-3.5 6,0 0,3.5 -6,0" fill="url(#top-md)"/>
    <polygon points="-6,0 0,3.5 0,10.5 -6,7" fill="url(#left-md)"/>
    <polygon points="6,0 0,3.5 0,10.5 6,7" fill="url(#right-md)"/>
  </g>

  <!-- Right child cube (medium, s=7) - lower -->
  <g transform="translate(48, 38)">
    <polygon points="0,-3.5 6,0 0,3.5 -6,0" fill="url(#top-md)"/>
    <polygon points="-6,0 0,3.5 0,10.5 -6,7" fill="url(#left-md)"/>
    <polygon points="6,0 0,3.5 0,10.5 6,7" fill="url(#right-md)"/>
  </g>

  <!-- Left grandchild cubes (3, s=5) - offset from each other -->
  <!-- Left-1 -->
  <g transform="translate(5, 48)">
    <polygon points="0,-2.5 4.3,0 0,2.5 -4.3,0" fill="url(#top-sm)"/>
    <polygon points="-4.3,0 0,2.5 0,7.5 -4.3,5" fill="url(#left-sm)"/>
    <polygon points="4.3,0 0,2.5 0,7.5 4.3,5" fill="url(#right-sm)"/>
  </g>

  <!-- Left-2 -->
  <g transform="translate(17, 51)">
    <polygon points="0,-2.5 4.3,0 0,2.5 -4.3,0" fill="url(#top-sm)"/>
    <polygon points="-4.3,0 0,2.5 0,7.5 -4.3,5" fill="url(#left-sm)"/>
    <polygon points="4.3,0 0,2.5 0,7.5 4.3,5" fill="url(#right-sm)"/>
  </g>

  <!-- Left-3 -->
  <g transform="translate(28, 49)">
    <polygon points="0,-2.5 4.3,0 0,2.5 -4.3,0" fill="url(#top-sm)"/>
    <polygon points="-4.3,0 0,2.5 0,7.5 -4.3,5" fill="url(#left-sm)"/>
    <polygon points="4.3,0 0,2.5 0,7.5 4.3,5" fill="url(#right-sm)"/>
  </g>

  <!-- Right grandchild cubes (2, s=5) - offset from each other -->
  <!-- Right-1 -->
  <g transform="translate(41, 56)">
    <polygon points="0,-2.5 4.3,0 0,2.5 -4.3,0" fill="url(#top-sm)"/>
    <polygon points="-4.3,0 0,2.5 0,7.5 -4.3,5" fill="url(#left-sm)"/>
    <polygon points="4.3,0 0,2.5 0,7.5 4.3,5" fill="url(#right-sm)"/>
  </g>

  <!-- Right-2 -->
  <g transform="translate(56, 57)">
    <polygon points="0,-2.5 4.3,0 0,2.5 -4.3,0" fill="url(#top-sm)"/>
    <polygon points="-4.3,0 0,2.5 0,7.5 -4.3,5" fill="url(#left-sm)"/>
    <polygon points="4.3,0 0,2.5 0,7.5 4.3,5" fill="url(#right-sm)"/>
  </g>
</svg>
