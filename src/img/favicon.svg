<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- 3D cube faces - parent (large) -->
    <linearGradient id="top-lg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e88a8a"/>
      <stop offset="100%" stop-color="#d46b6b"/>
    </linearGradient>
    <linearGradient id="left-lg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b84c4c"/>
      <stop offset="100%" stop-color="#a33e3e"/>
    </linearGradient>
    <linearGradient id="right-lg" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#cf5f5f"/>
      <stop offset="100%" stop-color="#c25252"/>
    </linearGradient>

    <!-- 3D cube faces - child (medium) -->
    <linearGradient id="top-md" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4a6a6"/>
      <stop offset="100%" stop-color="#e88a8a"/>
    </linearGradient>
    <linearGradient id="left-md" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c76060"/>
      <stop offset="100%" stop-color="#b84c4c"/>
    </linearGradient>
    <linearGradient id="right-md" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#db7777"/>
      <stop offset="100%" stop-color="#cf5f5f"/>
    </linearGradient>

    <!-- 3D cube faces - grandchild (small) -->
    <linearGradient id="top-sm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcc0c0"/>
      <stop offset="100%" stop-color="#f4a6a6"/>
    </linearGradient>
    <linearGradient id="left-sm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d47070"/>
      <stop offset="100%" stop-color="#c76060"/>
    </linearGradient>
    <linearGradient id="right-sm" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#e88e8e"/>
      <stop offset="100%" stop-color="#db7777"/>
    </linearGradient>
  </defs>

  <!-- Curved lines from parent to children -->
  <path d="M 32 22 C 32 29, 14 27, 14 31" stroke="rgba(252,103,103,0.7)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 32 22 C 32 29, 50 27, 50 31" stroke="rgba(252,103,103,0.7)" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Curved lines from left child to grandchildren -->
  <path d="M 14 44 C 14 50, 7 48, 7 52" stroke="rgba(252,103,103,0.6)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 14 44 C 14 50, 22 48, 22 52" stroke="rgba(252,103,103,0.6)" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Curved lines from right child to grandchildren -->
  <path d="M 50 44 C 50 50, 42 48, 42 52" stroke="rgba(252,103,103,0.6)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 50 44 C 50 50, 57 48, 57 52" stroke="rgba(252,103,103,0.6)" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Parent cube (large) - center top -->
  <g transform="translate(32, 11)">
    <polygon points="0,-7 10,-2.5 0,2 -10,-2.5" fill="url(#top-lg)"/>
    <polygon points="-10,-2.5 0,2 0,11 -10,6.5" fill="url(#left-lg)"/>
    <polygon points="10,-2.5 0,2 0,11 10,6.5" fill="url(#right-lg)"/>
  </g>

  <!-- Left child cube (medium) -->
  <g transform="translate(14, 35)">
    <polygon points="0,-5 7,-1.5 0,2 -7,-1.5" fill="url(#top-md)"/>
    <polygon points="-7,-1.5 0,2 0,9 -7,5.5" fill="url(#left-md)"/>
    <polygon points="7,-1.5 0,2 0,9 7,5.5" fill="url(#right-md)"/>
  </g>

  <!-- Right child cube (medium) -->
  <g transform="translate(50, 35)">
    <polygon points="0,-5 7,-1.5 0,2 -7,-1.5" fill="url(#top-md)"/>
    <polygon points="-7,-1.5 0,2 0,9 -7,5.5" fill="url(#left-md)"/>
    <polygon points="7,-1.5 0,2 0,9 7,5.5" fill="url(#right-md)"/>
  </g>

  <!-- Grandchild cubes (small) -->
  <!-- Left-left -->
  <g transform="translate(7, 55)">
    <polygon points="0,-3.5 5,-1 0,1.5 -5,-1" fill="url(#top-sm)"/>
    <polygon points="-5,-1 0,1.5 0,7.5 -5,5" fill="url(#left-sm)"/>
    <polygon points="5,-1 0,1.5 0,7.5 5,5" fill="url(#right-sm)"/>
  </g>

  <!-- Left-right -->
  <g transform="translate(22, 55)">
    <polygon points="0,-3.5 5,-1 0,1.5 -5,-1" fill="url(#top-sm)"/>
    <polygon points="-5,-1 0,1.5 0,7.5 -5,5" fill="url(#left-sm)"/>
    <polygon points="5,-1 0,1.5 0,7.5 5,5" fill="url(#right-sm)"/>
  </g>

  <!-- Right-left -->
  <g transform="translate(42, 55)">
    <polygon points="0,-3.5 5,-1 0,1.5 -5,-1" fill="url(#top-sm)"/>
    <polygon points="-5,-1 0,1.5 0,7.5 -5,5" fill="url(#left-sm)"/>
    <polygon points="5,-1 0,1.5 0,7.5 5,5" fill="url(#right-sm)"/>
  </g>

  <!-- Right-right -->
  <g transform="translate(57, 55)">
    <polygon points="0,-3.5 5,-1 0,1.5 -5,-1" fill="url(#top-sm)"/>
    <polygon points="-5,-1 0,1.5 0,7.5 -5,5" fill="url(#left-sm)"/>
    <polygon points="5,-1 0,1.5 0,7.5 5,5" fill="url(#right-sm)"/>
  </g>
</svg>
